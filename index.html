<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Conversor de Moedas</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:ital,wght@0,100..900;1,100..900&display=swap"
        rel="stylesheet">

</head>

<body>





    <img class="fundo-da-tela" src="./assets/PLANO DE FUNDO.png" alt="imagem-de-fundo">
    <main>

        <label>

            <div class="converter">Converter <b>de:</b></div>

            <select class="select-convert">

                <option value="real">R$ Real Brasileiro</option>
                <option value="dolar">US$ Dólar</option>
                <option value="euro">€ Euro</option>
                <option value="libra">£ Libra</option>
                <option value="bitcoin">₿ Bitcoin</option>
                <option value="rubr">₽ Rublo Russo</option>
            </select>

        </label>

        <label>
            <div class="convert">Converter <b>para:</b></div>

            <select class="select-currency">

                <option value="dolar">US$ Dólar</option>
                <option value="euro">€ Euro</option>
                <option value="libra">£ Libra</option>
                <option value="bitcoin">₿ Bitcoin</option>
                <option value="rubr">₽ Rublo Russo</option>
                 <option value="real">R$ Real Brasileiro</option>
            </select>

        </label>

        <label>
            <div class="convert"><b>Valor:</b></div>

            <input class="input-currancy" placeholder="R$ 10.0000,00">

        </label>

        <button class="convert-button">Converter</button>


        <section>
            <div class="real">

                <img src="./assets/brasil 2-1.png" alt="logo-moeda-a-converter">

                <p class="coin-real">Real</p>
                <p class="coin-value-real">R$ 0,00</p>
            </div>

            <img class="seta" src="./assets/Vector.png" alt="seta">

            <div>

                <img class="logo-coin-usa" src="./assets/estados-unidos (1) 1.png" alt="logo-moeda-convertida">

                <p class="coin-dolar">Dólar Americano</p>
                <p class="coin-value-dolar">US$ 0,00</p>

            </div>



        </section>


    </main>



</body>

<script src="./script.js"></script>


</html>
